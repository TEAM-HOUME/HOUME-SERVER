global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: houme-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app:8080']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
