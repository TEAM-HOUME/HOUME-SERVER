<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>HouMe 어드민 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .dashboard-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 40px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .management-section {
            border: 1px solid #dee2e6;
            border-radius: .5rem;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .api-result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="text-center">
        <h1>HouMe 어드민 페이지</h1>
        <p class="lead">성공적으로 로그인 되었습니다.</p>
    </div>

    <!-- 가구 관리 섹션 -->
    <div class="management-section">
        <h3 class="text-center mb-4">가구 관리</h3>
        
        <div class="text-center">
            <p>버튼을 눌러 등록된 모든 가구를 조회합니다.</p>
            <button id="get-furnitures-button" class="btn btn-secondary">등록된 가구 보기</button>
            <div id="get-furnitures-result" class="api-result"></div>
        </div>
        
        <hr class="my-4">

        <div id="furniture-form-container">
            <h4 class="text-center">신규 가구 등록</h4>
            <form id="furniture-form">
                <div class="mb-3">
                    <label for="furnitureNameKr" class="form-label">가구 이름 (한글)</label>
                    <input type="text" class="form-control" id="furnitureNameKr" required>
                </div>
                <div class="mb-3">
                    <label for="furnitureNameEng" class="form-label">가구 이름 (영어)</label>
                    <input type="text" class="form-control" id="furnitureNameEng" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="isBed">
                    <label class="form-check-label" for="isBed">침대 여부</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">가구 등록</button>
                </div>
            </form>
            <div id="furniture-api-result" class="api-result"></div>
        </div>

        <hr class="my-4">

        <div id="furniture-prompt-form-container">
            <h4 class="text-center">가구 프롬프트 등록</h4>
            <form id="furniture-prompt-form">
                <div class="mb-3">
                    <label for="promptFurnitureNameKr" class="form-label">가구 이름 (한글)</label>
                    <input type="text" class="form-control" id="promptFurnitureNameKr" required>
                </div>
                <div class="mb-3">
                    <label for="prompt" class="form-label">프롬프트</label>
                    <textarea class="form-control" id="prompt" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="tagId" class="form-label">스타일 태그</label>
                    <select class="form-select" id="tagId" required>
                        <option value="" selected disabled>태그를 선택하세요...</option>
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success">프롬프트 등록</button>
                </div>
            </form>
            <div id="furniture-prompt-api-result" class="api-result"></div>
        </div>
    </div>

    <!-- 향후 무드보드 관리 등 다른 섹션 추가 가능 -->

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            localStorage.setItem('accessToken', token);
            history.replaceState({}, document.title, window.location.pathname);
        }

        populateTagDropdown();

        document.getElementById('get-furnitures-button').addEventListener('click', function() {
            const accessToken = localStorage.getItem('accessToken');
            const resultDiv = document.getElementById('get-furnitures-result');

            if (resultDiv.innerHTML) {
                resultDiv.innerHTML = '';
                resultDiv.className = 'api-result';
                return;
            }

            testApiCall(accessToken, resultDiv, '/api/v1/admin/furnitures', 'GET', null, displayFurnituresAsTable);
        });

        document.getElementById('furniture-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const accessToken = localStorage.getItem('accessToken');
            const resultDiv = document.getElementById('furniture-api-result');
            
            const furnitureData = {
                furnitureNameKr: document.getElementById('furnitureNameKr').value,
                furnitureNameEng: document.getElementById('furnitureNameEng').value,
                isBed: document.getElementById('isBed').checked
            };

            testApiCall(accessToken, resultDiv, '/api/v1/admin/furniture', 'POST', furnitureData);
        });

        document.getElementById('furniture-prompt-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const accessToken = localStorage.getItem('accessToken');
            const resultDiv = document.getElementById('furniture-prompt-api-result');
            
            const promptData = {
                furnitureNameKr: document.getElementById('promptFurnitureNameKr').value,
                prompt: document.getElementById('prompt').value,
                tagId: parseInt(document.getElementById('tagId').value, 10)
            };

            testApiCall(accessToken, resultDiv, '/api/v1/admin/furniture/prompt', 'POST', promptData);
        });

        function populateTagDropdown() {
            const accessToken = localStorage.getItem('accessToken');
            if (!accessToken) return;

            const fetchOptions = {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                }
            };

            fetch('/api/v1/admin/furniture/tags', fetchOptions)
                .then(response => {
                    if (!response.ok) throw new Error('태그 목록 로딩 실패');
                    return response.json();
                })
                .then(data => {
                    const responseData = data.data;
                    if (responseData && Array.isArray(responseData.tagId) && Array.isArray(responseData.tagNameKr)) {
                        const selectElement = document.getElementById('tagId');
                        const tagIds = responseData.tagId;
                        const tagNames = responseData.tagNameKr;

                        for (let i = 0; i < tagIds.length; i++) {
                            const option = document.createElement('option');
                            option.value = tagIds[i];
                            option.textContent = `${tagNames[i]} (ID: ${tagIds[i]})`;
                            selectElement.appendChild(option);
                        }
                    }
                })
                .catch(error => console.error('태그 드롭다운 채우기 오류:', error));
        }

        function displayFurnituresAsTable(data, resultDiv) {
            const furnitures = data.data.furnitureKrNames;
            if (Array.isArray(furnitures)) {
                let tableHTML = '<table class="table table-bordered table-striped mt-3"><thead><tr><th>#</th><th>가구 이름</th></tr></thead><tbody>';
                furnitures.forEach((name, index) => {
                    tableHTML += `<tr><td>${index + 1}</td><td>${name}</td></tr>`;
                });
                tableHTML += '</tbody></table>';
                resultDiv.innerHTML = tableHTML;
            } else {
                resultDiv.textContent = 'API 응답: ' + JSON.stringify(data.data, null, 2);
            }
        }

        function testApiCall(accessToken, resultDiv, endpoint, method, body = null, successCallback = null) {
            if (!accessToken) {
                resultDiv.className = 'api-result alert alert-danger';
                resultDiv.textContent = '오류: 액세스 토큰을 찾을 수 없습니다. 다시 로그인해주세요.';
                return;
            }

            const fetchOptions = {
                method: method,
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                }
            };

            if (body) {
                fetchOptions.body = JSON.stringify(body);
            }

            fetch(endpoint, fetchOptions)
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(JSON.stringify(err)); });
                    }
                    return response.json();
                })
                .then(data => {
                    console.log(data);
                    resultDiv.className = 'api-result'; // Clear previous alert styles
                    if (successCallback) {
                        successCallback(data, resultDiv);
                    } else {
                        resultDiv.innerHTML = '<div class="alert alert-success">API 응답: ' + JSON.stringify(data.data, null, 2) + '</div>';
                    }
                })
                .catch(error => {
                    console.error('오류:', error);
                    resultDiv.className = 'api-result alert alert-danger';
                    resultDiv.textContent = 'API 오류: ' + error.message;
                });
        }
    };
</script>
</body>
</html>
