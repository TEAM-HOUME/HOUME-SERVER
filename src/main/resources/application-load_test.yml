spring:

  datasource:
    url: ${LOAD_TEST_DB_URL}
    username: ${LOAD_TEST_DB_USERNAME}
    password: ${LOAD_TEST_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${LOAD_TEST_DB_MAX_POOL_SIZE:20}

  jpa:
    open-in-view: false

  data:
    redis:
      host: ${LOAD_TEST_REDIS_HOST}
      port: ${LOAD_TEST_REDIS_PORT:6379}

  jwt:
    header: Authorization
    secret: ${LOAD_TEST_JWT_SECRET}
    access-token-validity-in-seconds: ${LOAD_TEST_ACCESS_TOKEN_VALIDITY:10800}
    refresh-token-validity-in-seconds: ${LOAD_TEST_REFRESH_TOKEN_VALIDITY:2592000}

server:
  env: load_test

load-test:
  gemini:
    min-delay-ms: ${LOAD_TEST_GEMINI_MIN_DELAY_MS:60000}
    max-delay-ms: ${LOAD_TEST_GEMINI_MAX_DELAY_MS:60000}
    failure-rate: ${LOAD_TEST_GEMINI_FAILURE_RATE:0.02}
    mock-image-url: ${LOAD_TEST_GEMINI_MOCK_IMAGE_URL:https://example.com/load-test-gemini.png}

houme:
  async:
    image-generation:
      mode: ${LOAD_TEST_IMAGE_GENERATION_EXECUTOR_MODE:virtual}
      platform:
        core-size: ${LOAD_TEST_IMAGE_GENERATION_CORE_SIZE:8}
        max-size: ${LOAD_TEST_IMAGE_GENERATION_MAX_SIZE:16}
        queue-capacity: ${LOAD_TEST_IMAGE_GENERATION_QUEUE_CAPACITY:8}
      virtual:
        concurrency-limit: ${LOAD_TEST_IMAGE_GENERATION_VIRTUAL_CONCURRENCY_LIMIT:16}

feign:
  client:
    config:
      default:
        connectTimeout: ${LOAD_TEST_FEIGN_CONNECT_TIMEOUT:5000}
        readTimeout: ${LOAD_TEST_FEIGN_READ_TIMEOUT:130000}

logging:
  level:
    or.sopt.houme.domain.generateImage.infrastructure.gemini.service.GeminiImageStubService: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env

  metrics:
    tags:
      application: houme-loadtest
    distribution:
      percentiles-histogram:
        http.server.requests: true
        houme.generate-image.async.duration: true
