services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:9090:9090"
    volumes:
      - ./metric/prometheus/prometheus.${DEPLOY_ENV:-dev}.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring-network

  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yml
    ports:
      - "${LOKI_BIND:-127.0.0.1}:3100:3100"
    volumes:
      - ./logging/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - monitoring-network

  alloy:
    image: grafana/alloy:v1.4.2
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      DEPLOY_ENV: ${DEPLOY_ENV:-dev}
      HOST_LABEL: ${HOST_LABEL:-houme-dev}
    volumes:
      - ./logging/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/nginx:/var/log/nginx:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:3000:3000"
    volumes:
      - ./metric/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./metric/grafana/dashboards:/var/lib/grafana/dashboards/metric:ro
      - ./logging/grafana/dashboards:/var/lib/grafana/dashboards/logging:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge
    name: monitoring-network

volumes:
  prometheus_data:
  loki_data:
  alloy_data:
  grafana_data:
