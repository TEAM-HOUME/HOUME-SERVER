name: develop-cd.yml
on:
  pull_request:
    types: [synchronize, closed, opened]
    branches: [develop]
    paths:
      - 'src/**'

jobs:
  set-environment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: 환경 변수 세팅 # 배포 환경 (개발 환경인지 운영 환경인지, 지금은 불필요)
        id: set-env
        run: |
          echo ${{ github.base_ref }}
#          echo "environment=develop" >> $GITHUB_OUTPUT
#
#          if [[ ${{ github.base_ref }} == "main" ]]; then
#            echo "environment=prod" >> $GITHUB_OUTPUT
#          fi
      - name: check env
        run: echo ${{ steps.set-env.outputs.environment }}

  image-build:
    runs-on: ubuntu-latest
    needs: [set-environment]
    permissions:
      id-token: write
      contents: read
    environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - name: checkout the code
        uses: actions/checkout@v4
      - name: AWS 설정
        id: credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Remove application-local.yml
        run: |
          rm -f src/main/resources/application-local.yml

      - name: Add application-blue.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION_BLUE }}" > ./src/main/resources/application-blue.yml

      - name: Add application-green.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION_GREEN }}" > ./src/main/resources/application-green.yml

      - name: Add application.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION_DEFAULT }}" > ./src/main/resources/application.yml

      - name: Add application-dev.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION_DEV }}" > ./src/main/resources/application-dev.yml
      - name: Jib로 이미지 빌드 및 ECR 업로드
        run: ./gradlew jib -PjibToImage=${{ secrets.ECR_REGISTRY }} -PjibTag=${{ github.run_id }}

  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: [ set-environment, image-build ]
    permissions:
      id-token: write
      contents: read
    environment: ${{ needs.set-environment.outputs.environment }}
    steps:
      - name: Set target IP
        run: |
          STATUS=$(curl -k -o /dev/null -w "%{http_code}" "http://${{ secrets.HOUME_DOMAIN }}/actuator/health")
          echo $STATUS
          if [ $STATUS = 200 ]; then
            CURRENT_UPSTREAM=$(curl -s -k http://${{ secrets.HOUME_DOMAIN }}/api/v1/env | jq -r '.env')
          else
            CURRENT_UPSTREAM=green
          fi
          echo CURRENT_UPSTREAM=$CURRENT_UPSTREAM >> $GITHUB_ENV
          if [ $CURRENT_UPSTREAM = blue ]; then
            echo "CURRENT_PORT=8080" >> $GITHUB_ENV
            echo "STOPPED_PORT=8081" >> $GITHUB_ENV
            echo "TARGET_UPSTREAM=green" >> $GITHUB_ENV
          elif [ $CURRENT_UPSTREAM = green ]; then
            echo "CURRENT_PORT=8081" >> $GITHUB_ENV
            echo "STOPPED_PORT=8080" >> $GITHUB_ENV
            echo "TARGET_UPSTREAM=blue" >> $GITHUB_ENV
          else
            echo "error"
            exit 1
          fi

      - name: Docker 로그인
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker compose
        uses: appleboy/ssh-action@master
        env:
          TARGET_UPSTREAM: ${{ env.TARGET_UPSTREAM }}
        with:
          username: ubuntu
          host: ${{ secrets.HOUME_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            sudo docker pull ${{ secrets.ECR_REGISTRY }}:latest
            sudo docker compose -f deploy/docker-compose-${{env.TARGET_UPSTREAM}}.yml up -d --remove-orphans

      - name: 새로운 서버 헬스체킹 (재시도 5회, 3초 간격)
        uses: appleboy/ssh-action@master
        env:
          STOPPED_PORT: ${{ env.STOPPED_PORT }}
        with:
          username: ubuntu
          host: ${{ secrets.HOUME_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            for i in {1..5}
            do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$STOPPED_PORT/actuator/health)
              echo "[$i] Health check response code: $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "서버 확인"
                exit 0
              fi
              sleep 3
            done
            echo "서버 헬스체크 실패"
            exit 1

      - name: nginx upstream 변경
        uses: appleboy/ssh-action@master
        with:
          username: ubuntu
          host: ${{ secrets.HOUME_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            echo "set \$service_url ${{ env.TARGET_UPSTREAM }};" | sudo tee /etc/nginx/sites-enabled/service-env.inc
            sudo nginx -t && sudo nginx -s reload

      - name: 기존 서버 중지
        uses: appleboy/ssh-action@master
        with:
          username: ubuntu
          host: ${{ secrets.HOUME_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            if [ "$(sudo docker ps -aq -f name=${{ env.CURRENT_UPSTREAM }})" ]; then
              sudo docker stop ${{ env.CURRENT_UPSTREAM }}
              sudo docker rm ${{ env.CURRENT_UPSTREAM }}
            else
              echo "No container named ${{ env.CURRENT_UPSTREAM }} found. Skipping stop & remove."
            fi

      - name: 기존 도커 이미지 제거
        uses: appleboy/ssh-action@master
        with:
          username: ubuntu
          host: ${{ secrets.HOUME_SERVER_IP }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            sudo docker image prune -f
  notify-discord-cd:
    needs: deploy # deploy job이 끝나야 실행
    runs-on: ubuntu-latest
    if: always()  # 성공하든 실패하든
    steps:
      - name: 디스코드 알림
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ needs.deploy.result }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          message="✅ CD 성공"
          color=3066993 # 초록
          if [ "$STATUS" != "success" ]; then
            message="❌ CD 실패"
            color=15158332 # 빨강
          fi
          # 디스코드에 보낼 payload JSON 생성
          # actor: 작성자, message: CD 완수 메시지, pr_url: PR 링크
          pr_title="$PR_TITLE"
          payload=$(jq -n --arg actor "${{ github.actor }}" \
                          --arg message "$message" \
                          --arg pr_url "https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}" \
                          --arg pr_title "$pr_title" \
                          --argjson color "$color" \
            '{
              # discord에 등록될 메시지 형태
              "embeds": [
                {
                  "title": "🙈새로운 배포 결과!",
                  "description": "\($actor)님이 배포를 진행했습니다!\n📄 \($pr_title) \n \($message)\n🔗[워크플로우 실행 확인하기](\($pr_url))",
                  "color": $color,
                  "timestamp": now | todateiso8601
                }
              ]
            }')

            # discord  웹훅 URL로 서버에 Post 요청
          curl  -H "Content-Type: application/json" \
                -X POST \
                -d "$payload" \
                "$DISCORD_WEBHOOK"
